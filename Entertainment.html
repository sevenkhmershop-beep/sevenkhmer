  // ======================= VIDEO DATABASE =======================

    { title: "នឹកភូមិភ្នំធំ", src: "https://www.youtube.com/embed/Ludst38lJRc", thumb: "https://img.youtube.com/vi/Ludst38lJRc/hqdefault.jpg", category: "folk" },
    { title: "បងគ្មានទរព្យធន", src: "https://www.youtube.com/embed/HjRUsew4WhU", thumb: "https://img.youtube.com/vi/HjRUsew4WhU/hqdefault.jpg", category: "modern" },
    { title: "ទន្សោងគោព្រៃ", src: "https://www.youtube.com/embed/70jyJ7l1vdw", thumb: "https://img.youtube.com/vi/70jyJ7l1vdw/hqdefault.jpg", category: "folk" },
    { title: "ចាញ់ស្នេហ៍បង", src: "https://www.youtube.com/embed/SPv8qv7R634", thumb: "https://img.youtube.com/vi/SPv8qv7R634/hqdefault.jpg", category: "love" },
    { title: "អូនគិតដល់បង", src: "https://www.youtube.com/embed/PeCPYZM_J_8", thumb: "https://img.youtube.com/vi/PeCPYZM_J_8/hqdefault.jpg", category: "romantic" },
    { title: "ស្នេហាអ្នកឡើងត្នោត", src: "https://www.youtube.com/embed/u57QaGZZUa4", thumb: "https://img.youtube.com/vi/u57QaGZZUa4/hqdefault.jpg", category: "pop" },
    { title: "មើលអីបង", src: "https://www.youtube.com/embed/FsEQtVehEEg", thumb: "https://img.youtube.com/vi/FsEQtVehEEg/hqdefault.jpg", category: "fun" },
    { title: "អោបប្តីនឹកសង្សា", src: "https://www.youtube.com/embed/bdbpG0ciIik", thumb: "https://img.youtube.com/vi/bdbpG0ciIik/hqdefault.jpg", category: "drama" },
    { title: "បើមិនប្រកាន់", src: "https://www.youtube.com/embed/nXZB0AiTYMw", thumb: "https://img.youtube.com/vi/nXZB0AiTYMw/hqdefault.jpg", category: "love" },
    { title: "នឹកប្រពន្ធគេ", src: "https://www.youtube.com/embed/VtPMnqmgJG4", thumb: "https://img.youtube.com/vi/VtPMnqmgJG4/hqdefault.jpg", category: "comedy" },
    { title: "ស្នេហ៍ប្រុសងក់ងរ", src: "https://www.youtube.com/embed/pVYwRHT4nyI", thumb: "https://i.ytimg.com/vi/pVYwRHT4nyI/hqdefault.jpg?sqp=-oaymwEnCNACELwBSFryq4qpAxkIARUAAIhCGAHYAQHiAQoIGBACGAY4AUAB&rs=AOn4CLBu024UZz_Vg_NwMgbcuUgiiCKFiQ", category: "comedy" },
    { title: "ញ៉ាំស្រា", src: "https://www.youtube.com/embed/AHmXbmxEikA", thumb: "https://i.ytimg.com/vi/AHmXbmxEikA/hqdefault.jpg?sqp=-oaymwEnCNACELwBSFryq4qpAxkIARUAAIhCGAHYAQHiAQoIGBACGAY4AUAB&rs=AOn4CLBOs-YGaD13ZkDLzjQpJgYEBe4HCg", category: "comedy" }
  ];
  // សម្រាប់ប៊ូតុង "បិទ Menu"
  function toggleMenu() {
    document.getElementById('mobileSidebar')
      .classList.add('-translate-x-full');

    document.getElementById('mobileSidebar')
      .classList.remove('translate-x-0');
  }

  const btn = document.getElementById("dropdownBtn");
const menu = document.getElementById("dropdownMenu");

// Toggle dropdown
btn.addEventListener("click", function (e) {
    e.stopPropagation(); // កុំឲ្យ event ទៅ document
    menu.classList.toggle("hidden");
});

// ចុចក្រៅដើម្បីបិទ
document.addEventListener("click", function (e) {
    if (!menu.contains(e.target) && !btn.contains(e.target)) {
        menu.classList.add("hidden");
    }
});

  // DOM elements
  const featuredDiv = document.getElementById("featuredVideo");
  const videoTitleSpan = document.getElementById("videoTitle");
  const playlistContainer = document.getElementById("playlistContainer");
  const recommendGrid = document.getElementById("recommendGrid");
  let currentVideoIndex = 0;
  let currentPlayer = null;
  let playerReady = false;

  function extractVideoId(url) {
    const match = url.match(/embed\/([a-zA-Z0-9_-]+)/);
    return match ? match[1] : "le20G8aOzsQ";
  }

  window.onYouTubeIframeAPIReady = function() {
    const firstVideoId = extractVideoId(videos[0].src);
    if (featuredDiv) {
      currentPlayer = new YT.Player('featuredVideo', {
        height: '100%',
        width: '100%',
        videoId: firstVideoId,
        playerVars: { autoplay: 0, modestbranding: 1, rel: 0, controls: 1, enablejsapi: 1 },
        events: {
          onReady: onPlayerReady,
          onStateChange: onPlayerStateChange
        }
      });
    }
  };

  function onPlayerReady(event) {
    playerReady = true;
    videoTitleSpan.innerText = videos[0].title;
    currentVideoIndex = 0;
    highlightActivePlaylist(0);
  }

  function onPlayerStateChange(event) {
    if (event.data === YT.PlayerState.ENDED) playNextVideo();
  }

  function playVideoByIndex(index) {
    if (!videos[index]) return;
    const video = videos[index];
    const videoId = extractVideoId(video.src);
    if (currentPlayer && playerReady) {
      currentPlayer.loadVideoById(videoId);
      videoTitleSpan.innerText = video.title;
    } else {
      featuredDiv.innerHTML = `<iframe src="${video.src}?autoplay=1" frameborder="0" allowfullscreen class="w-full aspect-video rounded-3xl"></iframe>`;
      videoTitleSpan.innerText = video.title;
    }
    currentVideoIndex = index;
    highlightActivePlaylist(index);
  }

  function playNextVideo() {
    let next = (currentVideoIndex + 1) % videos.length;
    playVideoByIndex(next);
  }

  function highlightActivePlaylist(activeIdx) {
    document.querySelectorAll('.playlist-item').forEach((el, idx) => {
      if (idx === activeIdx) el.classList.add('active');
      else el.classList.remove('active');
    });
  }

  function buildPlaylist() {
    playlistContainer.innerHTML = "";
    videos.forEach((video, idx) => {
      const div = document.createElement("div");
      div.className = "playlist-item flex gap-3 cursor-pointer bg-white/5 hover:bg-white/10 p-3 rounded-2xl transition-all duration-200 border border-transparent hover:border-orange-500/40";
      div.innerHTML = `
        <img src="${video.thumb}" class="w-20 h-16 object-cover rounded-xl shadow-md" loading="lazy">
        <div class="flex-1">
          <h4 class="font-semibold text-base line-clamp-1">${video.title}</h4>
          <p class="text-[11px] text-gray-400 flex items-center gap-1 mt-1"><i class="fas fa-music text-orange-400 text-[9px]"></i> វីដេអូថ្មី</p>
        </div>
        <i class="fas fa-play-circle text-orange-400 text-xl self-center opacity-70"></i>
      `;
      div.addEventListener("click", (e) => { e.preventDefault(); playVideoByIndex(idx); });
      playlistContainer.appendChild(div);
    });
    if(playlistContainer.firstChild) highlightActivePlaylist(0);
  }

  function buildRecommendations() {
    recommendGrid.innerHTML = "";
    const recVideos = videos.slice(0, 8);
    recVideos.forEach((video, idx) => {
      const card = document.createElement("div");
      card.className = "video-card bg-gray-900/60 backdrop-blur-sm rounded-2xl overflow-hidden border border-white/10 hover:border-orange-500/50 cursor-pointer transition-all duration-300 group";
      card.innerHTML = `
        <div class="relative overflow-hidden">
          <img src="${video.thumb}" class="w-full h-44 object-cover group-hover:scale-105 transition-transform duration-500">
          <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition">
            <i class="fas fa-play-circle text-5xl text-white drop-shadow-lg"></i>
          </div>
        </div>
        <div class="p-3">
          <h3 class="font-bold truncate">${video.title}</h3>
          <p class="text-xs text-gray-400 mt-1 flex items-center gap-1"><i class="fas fa-headphones"></i> 2.1k views</p>
        </div>
      `;
      card.addEventListener("click", () => {
        playVideoByIndex(idx);
        document.querySelector(".lg\\:col-span-2").scrollIntoView({ behavior: "smooth", block: "start" });
      });
      recommendGrid.appendChild(card);
    });
  }

  // Search
  const searchInput = document.getElementById("searchInput");
  function filterVideos(query) {
    const lowerQuery = query.toLowerCase();
    document.querySelectorAll(".playlist-item").forEach((item, i) => {
      item.style.display = videos[i]?.title.toLowerCase().includes(lowerQuery) ? "flex" : "none";
    });
    document.querySelectorAll(".video-card").forEach((card, i) => {
      card.style.display = videos[i]?.title.toLowerCase().includes(lowerQuery) ? "block" : "none";
    });
  }
  if (searchInput) searchInput.addEventListener("input", (e) => filterVideos(e.target.value));

  // Like button
  const likeBtn = document.getElementById("likeBtn");
  const likeSpan = document.getElementById("likeCount");
  const heartIconElem = document.getElementById("heartIcon");
  let likeCount = parseInt(localStorage.getItem("entertainment_likes") || "284");
  likeSpan.innerText = likeCount;

  likeBtn.addEventListener("click", () => {
    likeCount++;
    likeSpan.innerText = likeCount;
    localStorage.setItem("entertainment_likes", likeCount);
    heartIconElem.classList.remove("far");
    heartIconElem.classList.add("fas");
    likeBtn.classList.add("scale-105");
    setTimeout(() => likeBtn.classList.remove("scale-105"), 200);
    Swal.fire({ icon: 'success', title: 'ចូលចិត្តហើយ!', text: 'អរគុណសម្រាប់ការគាំទ្រ 💖', timer: 1200, showConfirmButton: false, background: '#0f172a', color: '#fff' });
  });

  // Share button
  const shareBtn = document.getElementById("shareBtn");
  const toastMsgDiv = document.getElementById("toastMsg");
  const toastTextSpan = document.getElementById("toastText");
  function showToast(message) {
    toastTextSpan.innerText = message;
    toastMsgDiv.classList.remove("hidden");
    setTimeout(() => toastMsgDiv.classList.add("hidden"), 2200);
  }
  shareBtn.addEventListener("click", () => {
    navigator.clipboard.writeText(window.location.href);
    showToast("🔗 ចម្លង Link ដោយជោគជ័យ!");
  });

  // Mobile menu
  window.toggleMobileMenu = function() {
    document.getElementById("mobileSidebar").classList.toggle("-translate-x-full");
    document.getElementById("overlayMenu").classList.toggle("hidden");
  };

  // Initialize
  document.addEventListener("DOMContentLoaded", () => {
    buildPlaylist();
    buildRecommendations();
    setTimeout(() => {
      if (!currentPlayer && featuredDiv) {
        featuredDiv.innerHTML = `<iframe src="${videos[0].src}?autoplay=0" frameborder="0" allowfullscreen class="w-full aspect-video rounded-3xl"></iframe>`;
        videoTitleSpan.innerText = videos[0].title;
      }
    }, 800);
    if (typeof YT === 'undefined') {
      window.onYouTubeIframeAPIReady = function() { 
        featuredDiv.innerHTML = `<iframe src="https://www.youtube.com/embed/${extractVideoId(videos[0].src)}" class="w-full aspect-video rounded-3xl" frameborder="0" allowfullscreen></iframe>`;
      };
      const script = document.createElement('script');
      script.src = "https://www.youtube.com/iframe_api";
      document.head.appendChild(script);
    }
  });
</script>
</body>
</html>
